# --- IP/Catch-all Redirect ---
server {
    listen 80 default_server;
    server_name _;
    return 301 https://portfolio-frontend.aws.siample.dev$request_uri;
}

# --- Frontend & API Proxy ---
server { 
  server_name portfolio-frontend.aws.siample.dev; 
  root /home/ubuntu/frontend; 
  index index.html; 
 
  access_log /var/log/nginx/frontend.access.log; 
  error_log /var/log/nginx/frontend.error.log; 
 
  location / { 
    try_files $uri /index.html =404; 
  } 
 
# Standard API calls
  location /api {  
    proxy_pass http://127.0.0.1:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }
# WebSockets (Stomp)
  location /ws {
    proxy_pass http://127.0.0.1:8080;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "Upgrade";
    proxy_set_header Host $host;
  } 

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/portfolio-backend.aws.siample.dev/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/portfolio-backend.aws.siample.dev/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
# --- Dedicated Backend Domain ---
server {
   server_name portfolio-backend.aws.siample.dev;
   location / {
     proxy_pass http://127.0.0.1:8080;
     proxy_set_header Host $host;
     proxy_set_header X-Real-IP $remote_addr;
     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
     proxy_set_header X-Forwarded-Proto $scheme;
   }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/portfolio-backend.aws.siample.dev/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/portfolio-backend.aws.siample.dev/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}


server {
    if ($host = portfolio-backend.aws.siample.dev) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


   listen 80;
   server_name portfolio-backend.aws.siample.dev;
    return 404; # managed by Certbot


}
server {
    if ($host = portfolio-frontend.aws.siample.dev) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

 
  listen 80; 
  server_name portfolio-frontend.aws.siample.dev;
    return 404; # managed by Certbot


}
